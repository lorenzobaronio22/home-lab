# Non-secret values for the upstream Gatus chart.
# Keep secret material in GitHub repository secrets and sync it to a Kubernetes Secret at deploy time.
gatus:
  ingress:
    enabled: true
    ingressClassName: tailscale
    annotations:
      tailscale.com/proxy-group: private-ingress-proxies
    hosts:
      - gatus.tail10187.ts.net

  persistence:
    enabled: true
    size: 200Mi

  envFrom:
    - secretRef:
        name: gatus-secrets

  config:
    storage:
      type: sqlite
      path: /data/data.db

    ui:
      title: Banzo Home Lab Services Status Page | Gatus
      header: Banzo Home Lab Services Status Page

    alerting:
      telegram:
        token: "${TELEGRAM_BOT_TOKEN}"
        id: "${TELEGRAM_CHAT_ID}"
        default-alert:
          description: health check failed
          send-on-resolved: true
          failure-threshold: 5
          success-threshold: 1

    endpoints:
      - name: im-learning-wordpress
        group: external
        url: https://im-learning.app/
        interval: 3m
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 48h"
        alerts:
          - type: telegram

      - name: im-learning-moodle
        group: external
        url: https://lab.im-learning.app/
        interval: 3m
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 48h"
        alerts:
          - type: telegram

      - name: gemgarden
        group: external
        url: https://gemgarden.org/
        interval: 3m
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 48h"
        alerts:
          - type: telegram

      - name: vault-vaultwarder
        group: external
        url: https://vault.lorenzobaronio.com/
        interval: 3m
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 48h"
        alerts:
          - type: telegram

      - name: blog
        group: external
        url: https://www.lorenzobaronio.com/
        interval: 3m
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 48h"
        alerts:
          - type: telegram

      - name: docmost
        group: internal
        url: https://notes.lorenzobaronio.com/
        interval: 3m
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 48h"
        alerts:
          - type: telegram

      - name: keycloak
        group: internal
        url: http://keycloak.tail10187.ts.net:9000/health/live
        interval: 3m
        conditions:
          - "[STATUS] == 200"
          - "has([BODY].status) == true"
          - "[BODY].status == UP"
        alerts:
          - type: telegram

      - name: gatus-secondary
        group: internal
        url: https://gatus-secondary.tail10187.ts.net/
        interval: 3m
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 48h"
        alerts:
          - type: telegram

      - name: ctfreak
        group: internal
        url: https://ctfreak.tail10187.ts.net/
        interval: 3m
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 48h"
        alerts:
          - type: telegram

      - name: grafana
        group: internal
        url: https://grafana.tail10187.ts.net/
        interval: 3m
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 48h"
        alerts:
          - type: telegram

      - name: prometheus
        group: internal
        url: https://prometheus.tail10187.ts.net/
        interval: 3m
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 48h"
        alerts:
          - type: telegram