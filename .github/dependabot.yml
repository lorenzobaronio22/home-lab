version: 2
updates:
  - package-ecosystem: helm
    directory: "/02.tailscale-operator"
    schedule:
      interval: weekly
      day: saturday
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      tailscale-operator:
        patterns:
          - "tailscale-operator"
