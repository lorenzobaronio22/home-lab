version: 2
updates:
  - package-ecosystem: helm
    directory: "/01.k3s-cluster/01.networking/tailscale-operator"
    schedule:
      interval: weekly
      day: saturday
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      tailscale-operator:
        patterns:
          - "tailscale-operator"
  - package-ecosystem: helm
    directory: "/01.k3s-cluster/02.storage/longhorn"
    schedule:
      interval: weekly
      day: saturday
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      longhorn:
        patterns:
          - "longhorn"
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: "main"
    schedule:
      interval: monthly
      day: saturday
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    groups:
      github-actions:
        patterns:
          - "*"
