name: Longhorn Upgrade

on:
  push:
    branches:
      - main
    paths:
      - "01.k3s-cluster/02.storage/longhorn/**"
      - ".github/workflows/longhorn-upgrade.yml"
  workflow_dispatch:

concurrency:
  group: longhorn-upgrade
  cancel-in-progress: false

jobs:
  upgrade:
    name: Upgrade longhorn on k3s
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      RELEASE_NAME: longhorn
      RELEASE_NAMESPACE: longhorn-system
      CHART_PATH: ./01.k3s-cluster/02.storage/longhorn
      CUSTOMIZATION_FILE: ./01.k3s-cluster/02.storage/longhorn/longhorn.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          set -euo pipefail
          for var in TS_OAUTH_CLIENT_ID TS_OAUTH_SECRET; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: $var" >&2
              exit 1
            fi
          done

      - name: Connect runner to tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Configure kubeconfig
        run: |
          tailscale configure kubeconfig tailscale-operator

      - name: Validate cluster access
        run: kubectl get nodes

      - name: Update chart dependencies
        run: helm dependency update "$CHART_PATH"

      - name: Validate rendered manifests
        run: |
          helm template "$RELEASE_NAME" "$CHART_PATH" \
            --namespace "$RELEASE_NAMESPACE" \
            --values "$CHART_PATH/values.yaml" > /tmp/longhorn-rendered.yaml

      - name: Upgrade release
        run: |
          set -euo pipefail
          helm upgrade --install "$RELEASE_NAME" "$CHART_PATH" \
            --namespace "$RELEASE_NAMESPACE" \
            --create-namespace \
            --values "$CHART_PATH/values.yaml" \
            --wait

      - name: Apply post-upgrade customization
        run: |
          kubectl -n "$RELEASE_NAMESPACE" apply -f "$CUSTOMIZATION_FILE"

      - name: Verify core deployment rollout
        run: |
          kubectl -n "$RELEASE_NAMESPACE" rollout status deployment/longhorn-driver-deployer --timeout=5m

      - name: Verify namespace workloads
        run: |
          kubectl -n "$RELEASE_NAMESPACE" get pods
