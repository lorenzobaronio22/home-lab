name: Grafana Cloud Dashboards Sync

on:
  push:
    branches:
      - main
    paths:
      - "01.k3s-cluster/03.observability/grafana-dashboards/**"
      - ".github/workflows/grafana-cloud-dashboards-sync.yml"
  workflow_dispatch:

concurrency:
  group: grafana-cloud-dashboards-sync
  cancel-in-progress: false

jobs:
  sync-dashboards:
    name: Sync dashboards to Grafana Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      DASHBOARDS_PATH: ./01.k3s-cluster/03.observability/grafana-dashboards/dashboards
      STACK_URL: ${{ secrets.GRAFANA_CLOUD_STACK_URL }}
      API_TOKEN: ${{ secrets.GRAFANA_CLOUD_DASHBOARDS_API_TOKEN }}
      FOLDER_UID: ${{ secrets.GRAFANA_CLOUD_FOLDER_UID_HOME_LAB }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        run: |
          set -euo pipefail
          for var in STACK_URL API_TOKEN FOLDER_UID; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: $var" >&2
              exit 1
            fi
          done

      - name: Preflight dashboard API auth
        run: |
          set -euo pipefail
          STACK_URL_SANITIZED="${STACK_URL%/}"
          curl -sS -f \
            -H "Authorization: Bearer $API_TOKEN" \
            "$STACK_URL_SANITIZED/api/health" \
            >/dev/null || {
              echo "Dashboard API auth failed. Ensure GRAFANA_CLOUD_DASHBOARDS_API_TOKEN is a Grafana service-account token with dashboard write permissions." >&2
              exit 1
            }

      - name: Validate dashboard JSON
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=("$DASHBOARDS_PATH"/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No dashboard JSON files found in $DASHBOARDS_PATH" >&2
            exit 1
          fi

          for file in "${files[@]}"; do
            echo "Validating $file"
            jq -e '.uid and .title and .panels and .templating and .schemaVersion' "$file" >/dev/null
          done

      - name: Sync dashboards (upsert by UID)
        run: |
          set -euo pipefail
          shopt -s nullglob
          STACK_URL_SANITIZED="${STACK_URL%/}"

          for file in "$DASHBOARDS_PATH"/*.json; do
            echo "Syncing $file"

            payload=$(jq -c --arg folderUid "$FOLDER_UID" --arg message "CI sync from $(basename "$file")" '{dashboard: ., folderUid: $folderUid, overwrite: true, message: $message}' "$file")

            response=$(curl -sS -f \
              -H "Authorization: Bearer $API_TOKEN" \
              -H "Content-Type: application/json" \
              -X POST \
              "$STACK_URL_SANITIZED/api/dashboards/db" \
              -d "$payload")

            status=$(echo "$response" | jq -r '.status // "unknown"')
            uid=$(echo "$response" | jq -r '.uid // "n/a"')
            url=$(echo "$response" | jq -r '.url // "n/a"')
            echo "Result: status=$status uid=$uid url=$url"
          done

  sync-alert-rules:
    name: Sync alert rule groups to Grafana Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      STACK_URL: ${{ secrets.GRAFANA_CLOUD_STACK_URL }}
      API_TOKEN: ${{ secrets.GRAFANA_CLOUD_DASHBOARDS_API_TOKEN }}
      FOLDER_UID: ${{ secrets.GRAFANA_CLOUD_FOLDER_UID_HOME_LAB }}
      PROM_DS_UID: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_DS_UID }}
      LOKI_DS_UID: ${{ secrets.GRAFANA_CLOUD_LOKI_DS_UID }}
      ALERTS_PATH: ./01.k3s-cluster/03.observability/grafana-dashboards/alerts/rule-groups
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        run: |
          set -euo pipefail
          for var in STACK_URL API_TOKEN FOLDER_UID PROM_DS_UID LOKI_DS_UID; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: $var" >&2
              exit 1
            fi
          done

      - name: Preflight alert provisioning API auth
        run: |
          set -euo pipefail
          STACK_URL_SANITIZED="${STACK_URL%/}"
          curl -sS -f \
            -H "Authorization: Bearer $API_TOKEN" \
            "$STACK_URL_SANITIZED/api/health" \
            >/dev/null || {
              echo "Alert API auth failed. Ensure GRAFANA_CLOUD_DASHBOARDS_API_TOKEN includes alert provisioning write permission in addition to dashboard write." >&2
              exit 1
            }

      - name: Validate alert rule group JSON syntax
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=("$ALERTS_PATH"/*.json)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No alert rule group files found; skipping."
            exit 0
          fi

          for file in "${files[@]}"; do
            echo "Validating $file"
            jq -e '.name and .interval and .rules' "$file" >/dev/null
          done

          echo "Alert artifact syntax validated."

      - name: Sync alert rule groups (upsert)
        run: |
          set -euo pipefail
          shopt -s nullglob
          STACK_URL_SANITIZED="${STACK_URL%/}"
          files=("$ALERTS_PATH"/*.json)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No alert rule group files found; skipping."
            exit 0
          fi

          for file in "${files[@]}"; do
            group_name="$(jq -r '.name' "$file")"

            if [ "$group_name" = "null" ] || [ -z "$group_name" ]; then
              echo "Invalid rule group name in $file" >&2
              exit 1
            fi

            payload="$(jq -c --arg prom "$PROM_DS_UID" --arg loki "$LOKI_DS_UID" '
              .rules |= map(
                .data |= map(
                  if .datasourceUid == "__PROM_DS_UID__" then .datasourceUid = $prom
                  elif .datasourceUid == "__LOKI_DS_UID__" then .datasourceUid = $loki
                  else .
                  end
                )
              )
            ' "$file")"

            if echo "$payload" | grep -q '__PROM_DS_UID__\|__LOKI_DS_UID__'; then
              echo "Unresolved datasource UID placeholders in $file" >&2
              exit 1
            fi

            encoded_group_name="$(printf '%s' "$group_name" | jq -sRr @uri)"

            echo "Syncing alert group $group_name from $file"
            curl -sS -f \
              -H "Authorization: Bearer $API_TOKEN" \
              -H "Content-Type: application/json" \
              -X PUT \
              "$STACK_URL_SANITIZED/api/v1/provisioning/folder/$FOLDER_UID/rule-groups/$encoded_group_name" \
              -d "$payload" \
              >/dev/null

            echo "Synced alert group: $group_name"
          done
