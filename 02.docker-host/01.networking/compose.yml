services:
  cloudflared:
    command: tunnel --no-autoupdate run
    container_name: cloudflared
    image: cloudflare/cloudflared:2026.6.1
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TOKEN}
      - TUNNEL_METRICS=0.0.0.0:60123
    network_mode: service:tailscale-cloudflare-tunnel
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "ready"]                                                                                                               
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
  tailscale-cloudflare-tunnel:
    image: tailscale/tailscale:v1.98.4
    container_name: tailscale-cloudflare-tunnel
    hostname: cloudflare-tunnel
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ./tailscale/state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "tailscale status >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
